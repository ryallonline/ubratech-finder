name: Publish reviews feed
on:
  schedule:
    - cron: '30 3 * * *'        # daily 03:30 UTC (05:30 SAST)
  workflow_dispatch:            # run manually from the Actions tab
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build reviews.json from Judge.me
        env:
          JUDGEME_TOKEN: ${{ secrets.JUDGEME_TOKEN }}
          SHOP_DOMAIN: d0xj1z-zj.myshopify.com
        run: python3 .github/scripts/build_reviews.py
      - name: Commit + purge CDN if changed
        run: |
          if git diff --quiet -- reviews.json; then
            echo "No change in reviews.json."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add reviews.json
            git commit -m "chore: refresh reviews.json"
            git push
            curl -s "https://purge.jsdelivr.net/gh/ryallonline/ubratech-finder@main/reviews.json" > /dev/null || true
            echo "reviews.json updated + jsDelivr purge requested."
          fi
